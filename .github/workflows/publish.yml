name: Publish to Comfy Registry
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["pyproject.toml"]
jobs:
  publish-node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Comfy-Org/publish-node-action@v1.0.1
        with:
          personal_access_token: ${{ secrets.REGISTRY_ACCESS_TOKEN }}
